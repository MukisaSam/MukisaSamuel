# alembic.ini
# -----------
# Configuration for Alembic, the database MIGRATION tool.
#
# A "migration" is a versioned change to your database structure (adding a
# table, a column, etc.). Migrations let a whole team evolve the database
# safely and in the same order, instead of everyone editing tables by hand.

[alembic]
script_location = alembic
prepend_sys_path = .

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
